
<style>
.nav-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.nav-btn{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 14px;font-size:13px;cursor:pointer;color:var(--color-text-secondary)}
.nav-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.section{display:none}.section.active{display:block}
.metric-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.metric-label{font-size:12px;color:var(--color-text-secondary);margin:0 0 4px}
.metric-value{font-size:20px;font-weight:500;color:var(--color-text-primary);margin:0}
.leg{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px;font-size:12px;color:var(--color-text-secondary)}
.leg span{display:flex;align-items:center;gap:4px}
.leg b{width:10px;height:10px;border-radius:2px;display:inline-block}
.sel-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem;font-size:13px;color:var(--color-text-secondary)}
select{font-size:13px;padding:4px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
</style>

<div style="padding:1rem 0">
<div class="nav-row">
  <button class="nav-btn active" onclick="showSection('s1',this)">% RT berbalita per kab/kota</button>
  <button class="nav-btn" onclick="showSection('s2',this)">% RT berbalita per desil</button>
  <button class="nav-btn" onclick="showSection('s3',this)">Konsumsi: berbalita vs tidak</button>
  <button class="nav-btn" onclick="showSection('s4',this)">Konsumsi per desil</button>
  <button class="nav-btn" onclick="showSection('s5',this)">Desil per kab/kota</button>
</div>

<div id="s1" class="section active">
  <div class="metric-row">
    <div class="metric"><p class="metric-label">Rata-rata % berbalita</p><p class="metric-value" id="m1a">—</p></div>
    <div class="metric"><p class="metric-label">Tertinggi</p><p class="metric-value" id="m1b">—</p></div>
    <div class="metric"><p class="metric-label">Terendah</p><p class="metric-value" id="m1c">—</p></div>
  </div>
  <div class="leg"><span><b style="background:#378ADD"></b>Kabupaten</span><span><b style="background:#1D9E75"></b>Kota</span></div>
  <div style="position:relative;width:100%;height:780px"><canvas id="c1"></canvas></div>
</div>

<div id="s2" class="section">
  <div class="metric-row">
    <div class="metric"><p class="metric-label">Desil termiskin</p><p class="metric-value" id="m2a">—</p></div>
    <div class="metric"><p class="metric-label">Desil terkaya</p><p class="metric-value" id="m2b">—</p></div>
    <div class="metric"><p class="metric-label">Selisih</p><p class="metric-value" id="m2c">—</p></div>
  </div>
  <div style="position:relative;width:100%;height:320px"><canvas id="c2"></canvas></div>
</div>

<div id="s3" class="section">
  <div class="sel-row">
    <label>Wilayah:</label>
    <select id="sel3" onchange="updateS3()">

      <option value="jabar">Jawa Barat</option>
    </select>
  </div>
  <div class="metric-row">
    <div class="metric"><p class="metric-label">Kalori RT berbalita</p><p class="metric-value" id="m3a">—</p></div>

  <div style="position:relative;width:100%;height:300px"><canvas id="c3"></canvas></div>
</div>

<div id="s4" class="section">

  <div style="position:relative;width:100%;height:320px"><canvas id="c4"></canvas></div>
</div>

<div id="s5" class="section">

</div>
</div>

let charts = {};

function makeChart(id, config) {
  if(charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id), config);
}

function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(id==='s1') initS1();
  if(id==='s2') initS2();
  if(id==='s3') updateS3();
  if(id==='s4') updateS4();
  if(id==='s5') initS5();
}

function initS1() {
  const avg = (kabData.reduce((s,d)=>s+d.pct,0)/kabData.length).toFixed(1);
  const top = kabData.reduce((a,b)=>b.pct>a.pct?b:a);
  const bot = kabData.reduce((a,b)=>b.pct<a.pct?b:a);
  document.getElementById('m1a').textContent = avg+'%';
  document.getElementById('m1b').textContent = top.pct.toFixed(1)+'%';
  document.getElementById('m1c').textContent = bot.pct.toFixed(1)+'%';
  makeChart('c1',{
    type:'bar',
    data:{
      labels: kabData.map(d=>d.name),
      datasets:[{
        data: kabData.map(d=>parseFloat(d.pct.toFixed(2))),
        backgroundColor: kabData.map(d=>d.isKota?'#1D9E75':'#378ADD'),
        borderRadius:3, barThickness:18
      }]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.parsed.x.toFixed(2)+'% RT berbalita'}}},
      scales:{
        x:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{color:'#888780',font:{size:11},callback:v=>v+'%'}},
        y:{grid:{display:false},ticks:{color:'#5F5E5A',font:{size:11}}}
      }
    }
  });
}

function initS2() {

function updateS3() {

  const d = v==='nas' ? konsNas : konsJabar;
  document.getElementById('m3a').textContent = Math.round(d.ya.kalori)+' kkal';
  document.getElementById('m3b').textContent = Math.round(d.tdk.kalori)+' kkal';
  document.getElementById('m3c').textContent = 'Rp '+Math.round(d.ya.kapita/1000)+'rb';
  const labels=['Kalori (kkal/kap/hr)','Protein (g/hr)','Lemak (g/hr)','Karbo (g/hr)','Food share (%)'];
  const tdkVals=[d.tdk.kalori/30, d.tdk.protein, d.tdk.lemak, d.tdk.karbo/8, d.tdk.food_shr];
  const yaVals=[d.ya.kalori/30, d.ya.protein, d.ya.lemak, d.ya.karbo/8, d.ya.food_shr];
  makeChart('c3',{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Tidak punya balita',data:tdkVals.map(v=>parseFloat(v.toFixed(1))),backgroundColor:'#378ADD',borderRadius:3},
        {label:'Punya balita',data:yaVals.map(v=>parseFloat(v.toFixed(1))),backgroundColor:'#D85A30',borderRadius:3}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.parsed.y.toFixed(1)}}},
      scales:{

      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.parsed.y.toFixed(1)+'% RT berbalita'}}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#888780',font:{size:11},autoSkip:false}},
        y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{color:'#888780',font:{size:11},callback:v=>v+'%'},min:0}
      }
    }
  });
}

initS1();
</script>
